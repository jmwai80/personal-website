name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository_owner }}/personal-website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull arm64 image for streaming
        run: docker pull --platform linux/arm64 ghcr.io/${{ github.repository_owner }}/personal-website:latest

      - name: Deploy to VM
        run: |
          echo "${{ secrets.VM_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          docker save ghcr.io/${{ github.repository_owner }}/personal-website:latest | \
            ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
                ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
                'docker load && cd /app && docker compose up -d && docker image prune -f'
          rm -f /tmp/deploy_key

      - name: Write env vars to VM
        run: |
          echo "${{ secrets.VM_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Use heredoc in the remote shell to avoid $$ expansion
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
              'cat > /app/.env << '\''EOF'\''
ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
SESSION_SECRET=${{ secrets.SESSION_SECRET }}
EOF'
          rm -f /tmp/deploy_key
