{{ define "base" }}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Mwai — Software Engineer</title>
  <meta name="description" content="Software engineer building scalable systems and web applications." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['JetBrains Mono', 'Fira Code', 'monospace'] },
          colors: { accent: '#10b981' }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    html { scroll-behavior: smooth; }
    .fade-in { animation: fadeIn 0.6s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 font-mono min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="border-b border-gray-800 px-6 py-4">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <span class="text-accent font-semibold text-lg">jm<span class="text-gray-500">@dev</span></span>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="#about" class="hover:text-accent transition-colors">about</a>
        <a href="#projects" class="hover:text-accent transition-colors">projects</a>
        <a href="#contact" class="hover:text-accent transition-colors">contact</a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 max-w-3xl mx-auto w-full px-6 py-20 fade-in">
    {{ template "content" . }}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-800 px-6 py-6 text-center text-gray-600 text-xs">
    <span>© 2026 John Mwai &nbsp;·&nbsp; Built with Go</span>
  </footer>

</body>
</html>
{{ end }}
